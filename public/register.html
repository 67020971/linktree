<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen bg-gradient-to-br from-gray-950 via-slate-900 to-black flex items-center justify-center p-6">

<div class="bg-white/10 backdrop-blur-lg border border-white/10 rounded-2xl p-8 w-full max-w-md shadow-2xl">

<h2 class="text-3xl font-bold text-white text-center mb-6">
Create Account
</h2>

<input id="username"
placeholder="Username"
class="w-full p-3 rounded-lg bg-black/40 text-white border border-gray-700 focus:outline-none focus:border-blue-500 mb-4"
/>

<input id="password"
type="password"
placeholder="Password"
class="w-full p-3 rounded-lg bg-black/40 text-white border border-gray-700 focus:outline-none focus:border-blue-500 mb-4"
/>

<button onclick="register()"
class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold p-3 rounded-lg transition duration-200">
Register
</button>

<p id="msg" class="text-center text-gray-300 mt-4"></p>

<p class="text-center text-gray-400 mt-4">
Already have an account?
<a href="/login.html" class="text-blue-400 hover:underline">Login</a>
</p>

</div>

<script>
async function register(){

const username = document.getElementById("username").value
const password = document.getElementById("password").value

const res = await fetch("/api/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:username,
password:password
})
})

const data = await res.json()

document.getElementById("msg").innerText = data.message

if(data.success){
setTimeout(()=>{
window.location.href="/login.html"
},1000)
}

}
</script>

</body>
</html>
