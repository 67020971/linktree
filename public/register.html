<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen bg-gradient-to-br from-gray-950 via-slate-900 to-black text-white">

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 w-full flex justify-between items-center px-10 py-5 bg-black/30 backdrop-blur-md border-b border-white/10 z-50">

<div class="text-xl font-bold">
<a href="/">MyLink</a>
</div>

<div id="nav-links" class="space-x-6 text-gray-200"></div>

</nav>


<!-- REGISTER CARD -->
<div class="flex items-center justify-center pt-32 p-6">

<div class="bg-white/10 backdrop-blur-lg border border-white/10 rounded-2xl p-8 w-full max-w-md shadow-2xl">

<h2 class="text-3xl font-bold text-center mb-6">
Register
</h2>

<input id="username"
placeholder="Username"
class="w-full p-3 rounded-lg bg-black/40 border border-gray-700 focus:outline-none focus:border-blue-500 mb-4"
/>

<input id="password"
type="password"
placeholder="Password"
class="w-full p-3 rounded-lg bg-black/40 border border-gray-700 focus:outline-none focus:border-blue-500 mb-4"
/>

<button onclick="register()"
class="w-full bg-green-600 hover:bg-green-700 font-semibold p-3 rounded-lg transition">
Create Account
</button>

<p id="msg" class="text-center text-gray-300 mt-4"></p>

<p class="text-center text-gray-400 mt-4">
Already have an account?
<a href="/login.html" class="text-blue-400 hover:underline">Login</a>
</p>

</div>

</div>

<script>

/* ---------- NAVBAR ---------- */

const user = localStorage.getItem("user")
const nav = document.getElementById("nav-links")

if(user){

nav.innerHTML = `
<a href="/dashboard.html" class="hover:text-white">Dashboard</a>
<a href="/profile.html?user=${user}" class="hover:text-white">Profile</a>
<button onclick="logout()" class="text-red-400 hover:text-red-300">Logout</button>
`

}else{

nav.innerHTML = `
<a href="/login.html" class="hover:text-white">Login</a>
<a href="/register.html" class="hover:text-white">Register</a>
`

}

function logout(){
localStorage.removeItem("user")
window.location.href="/login.html"
}


/* ---------- REGISTER ---------- */

async function register(){

const username = document.getElementById("username").value
const password = document.getElementById("password").value

if(!username || !password){
document.getElementById("msg").innerText="Please fill all fields"
return
}

const res = await fetch("https://linktree-o4ch.onrender.com/api/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username,password})
})

const data = await res.json()

console.log(data)

document.getElementById("msg").innerText=data.message

if(data.success){
    
setTimeout(()=>{
window.location.href="/login.html"
},1000)

}

}

</script>

</body>
</html>
