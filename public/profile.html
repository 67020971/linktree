<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

</head>

<body id="body"
class="min-h-screen pt-20 bg-gradient-to-br from-gray-950 via-slate-900 to-black flex items-center justify-center p-6">

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 w-full flex justify-between items-center px-10 py-5 bg-black/30 backdrop-blur-md border-b border-white/10 z-50">

    <button onclick="shareProfile()"
class="fixed top-24 right-6 z-50
bg-white/10 backdrop-blur
border border-white/20
text-white
w-12 h-12
rounded-full
flex items-center justify-center
text-xl
hover:bg-white/20
transition shadow-lg">

📤

</button>
<div class="text-xl font-bold text-white">
<a href="/" class="hover:text-blue-400 transition">
MyLink
</a>
</div>

<div id="nav-links" class="space-x-6 text-gray-200 text-sm"></div>

</nav>


<div class="w-full max-w-md">

<!-- PROFILE -->
<div class="text-center mb-8">

<div class="w-24 h-24 mx-auto rounded-full overflow-hidden
bg-gradient-to-r from-blue-500 to-purple-600
flex items-center justify-center mb-4">

<img id="avatarImg" class="w-full h-full object-cover hidden">
<span id="avatarText" class="text-3xl text-white font-bold"></span>

</div>

<input type="file" id="avatarInput"
class="text-white text-sm mb-2">

<button onclick="uploadAvatar()"
class="bg-blue-600 hover:bg-blue-700 transition text-white px-4 py-1 rounded text-sm mb-4">
Upload Avatar
</button>

<h1 id="username" class="text-3xl font-bold text-white"></h1>

<button onclick="copyProfile()"
class="text-sm text-blue-400 hover:underline mt-2">
Copy Profile Link
</button>



</div>


<!-- THEME -->
<div class="mb-6 text-center">

<select id="themeSelect"
class="p-2 rounded-lg bg-black/40 text-white border border-white/10">

<option value="dark">Dark</option>
<option value="purple">Purple</option>
<option value="blue">Blue</option>
<option value="green">Green</option>

</select>

</div>


<!-- LINKS -->
<div id="links" class="space-y-4"></div>

</div>



<!-- EDIT MODAL -->
<div id="editModal"
class="fixed inset-0 bg-black/70 hidden items-center justify-center">

<div class="bg-gray-900 border border-white/10 p-6 rounded-xl w-80">

<h2 class="text-white text-xl mb-4">
Edit Link
</h2>

<input id="editTitle"
class="w-full p-2 mb-3 rounded bg-black border border-gray-700 text-white">

<input id="editUrl"
class="w-full p-2 mb-4 rounded bg-black border border-gray-700 text-white">

<div class="flex gap-2">

<button onclick="saveEdit()"
class="flex-1 bg-blue-600 hover:bg-blue-700 text-white p-2 rounded">
Save
</button>

<button onclick="closeEdit()"
class="flex-1 bg-gray-700 hover:bg-gray-600 text-white p-2 rounded">
Cancel
</button>

</div>

</div>
</div>



<!-- DELETE MODAL -->
<div id="deleteModal"
class="fixed inset-0 bg-black/70 hidden items-center justify-center">

<div class="bg-gray-900 border border-white/10 p-6 rounded-xl w-80 text-center">

<h2 class="text-white text-xl mb-3">
Delete Link
</h2>

<p class="text-gray-400 text-sm mb-6">
Are you sure you want to delete this link?
</p>

<div class="flex gap-3">

<button onclick="closeDelete()"
class="flex-1 bg-gray-700 hover:bg-gray-600 text-white p-2 rounded">
Cancel
</button>

<button onclick="confirmDelete()"
class="flex-1 bg-red-600 hover:bg-red-700 text-white p-2 rounded">
Delete
</button>

</div>

</div>
</div>



<script>

// LOGIN USER
const user = localStorage.getItem("user")

// PROFILE USERNAME
const params = new URLSearchParams(window.location.search)
const username = params.get("user")

document.getElementById("username").innerText = username
document.getElementById("avatarText").innerText =
username.charAt(0).toUpperCase()

const isOwner = user === username


// NAVBAR
const nav = document.getElementById("nav-links")

if(user){

nav.innerHTML = `
<a href="/dashboard.html" class="hover:text-blue-400">Dashboard</a>
<a href="/profile.html?user=${user}" class="hover:text-blue-400">My Profile</a>
<button onclick="logout()" class="text-red-400 hover:text-red-300">Logout</button>
`

}else{

nav.innerHTML = `
<a href="/login.html">Login</a>
<a href="/register.html">Register</a>
`

}

function logout(){
localStorage.removeItem("user")
location.href="/login.html"
}


// LOAD USER
async function loadUser(){

const res = await fetch("https://linktree-o4ch.onrender.com/api/user/"+username)
const data = await res.json()

if(data.avatar){

const img = document.getElementById("avatarImg")
const text = document.getElementById("avatarText")

img.src="https://linktree-o4ch.onrender.com/uploads/"+data.avatar+"?t="+Date.now()

img.classList.remove("hidden")
text.classList.add("hidden")

}

}


// LOAD LINKS
async function loadLinks(){

const res = await fetch("https://linktree-o4ch.onrender.com/api/links/"+username)
const links = await res.json()

const container=document.getElementById("links")
container.innerHTML=""

links.forEach(link=>{

const div=document.createElement("div")

div.className=`
bg-white/10 backdrop-blur
border border-white/10
text-white
p-4 rounded-xl
hover:bg-white/20
transition
cursor-move
`

let buttons=""

if(isOwner){

buttons=`
<div class="flex gap-3 mt-3 justify-center text-sm">

<button
class="text-blue-400 hover:text-blue-300"
onclick="openEdit('${link._id}','${link.title}','${link.url}')">
Edit
</button>

<button
class="text-red-400 hover:text-red-300"
onclick="openDelete('${link._id}')">
Delete
</button>

</div>
`

}

div.innerHTML=`
<a href="${link.url}" target="_blank"
class="block text-center hover:underline"
onclick="viewLink('${link._id}')">

<div class="font-semibold">${link.title}</div>
<div class="text-xs opacity-60">${link.views || 0} views</div>

</a>

${buttons}
`

container.appendChild(div)

})

new Sortable(container,{ animation:150 })

}

loadUser()
loadLinks()


// VIEW
function viewLink(id){
fetch("https://linktree-o4ch.onrender.com/api/view/"+id,{method:"POST"})
}


// EDIT
let editingId=null

function openEdit(id,title,url){

editingId=id
editTitle.value=title
editUrl.value=url

editModal.classList.remove("hidden")
editModal.classList.add("flex")

}

function closeEdit(){
editModal.classList.add("hidden")
}

async function saveEdit(){

await fetch("https://linktree-o4ch.onrender.com/api/edit-link/"+editingId,{
method:"PUT",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({
title:editTitle.value,
url:editUrl.value
})
})

closeEdit()
loadLinks()

}


// DELETE
let deleteId=null

function openDelete(id){

deleteId=id

deleteModal.classList.remove("hidden")
deleteModal.classList.add("flex")

}

function closeDelete(){
deleteModal.classList.add("hidden")
}

async function confirmDelete(){

await fetch("https://linktree-o4ch.onrender.com/api/delete-link/"+deleteId,{
method:"DELETE"
})

closeDelete()
loadLinks()

}


// AVATAR
async function uploadAvatar(){

const file=document.getElementById("avatarInput").files[0]

if(!file){
alert("Select image first")
return
}

const formData=new FormData()

formData.append("avatar",file)
formData.append("username",username)

const res=await fetch("https://linktree-o4ch.onrender.com/api/upload-avatar",{
method:"POST",
body:formData
})

const data=await res.json()

if(data.success){

alert("Avatar updated")
location.reload()

}else{

alert("Upload failed")

}

}


// THEME
document.getElementById("themeSelect")
.addEventListener("change",e=>{

const body=document.getElementById("body")

const themes={
dark:"from-gray-950 via-slate-900 to-black",
purple:"from-purple-900 via-purple-700 to-black",
blue:"from-blue-900 via-blue-700 to-black",
green:"from-green-900 via-green-700 to-black"
}

body.className=
`min-h-screen pt-20 bg-gradient-to-br ${themes[e.target.value]} flex items-center justify-center p-6`

})


// COPY PROFILE
function copyProfile(){

navigator.clipboard.writeText(location.href)

alert("Profile link copied!")

}


function shareProfile(){

const url = window.location.href

if(navigator.share){

navigator.share({
title: "My Link Page",
text: "ดูโปรไฟล์ของฉัน",
url: url
})

}else{

navigator.clipboard.writeText(url)
alert("คัดลอกลิงก์แล้ว: " + url)

}

}

</script>

</body>
</html>
