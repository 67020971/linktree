<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen bg-gradient-to-br from-gray-950 via-slate-900 to-black text-white">

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 w-full flex justify-between items-center px-10 py-5 bg-black/30 backdrop-blur-md border-b border-white/10 z-50">

<div class="text-xl font-bold">
<a href="/">MyLink</a>
</div>

<div id="nav-links" class="space-x-6 text-gray-200"></div>

</nav>


<!-- LOGIN CARD -->
<div class="flex items-center justify-center pt-32 p-6">

<div class="bg-white/10 backdrop-blur-lg border border-white/10 rounded-2xl p-8 w-full max-w-md shadow-2xl">

<h2 class="text-3xl font-bold text-center mb-6">
Login
</h2>

<input id="username"
placeholder="Username"
class="w-full p-3 rounded-lg bg-black/40 border border-gray-700 focus:outline-none focus:border-blue-500 mb-4"
/>

<input id="password"
type="password"
placeholder="Password"
class="w-full p-3 rounded-lg bg-black/40 border border-gray-700 focus:outline-none focus:border-blue-500 mb-4"
/>

<button onclick="login()"
class="w-full bg-blue-600 hover:bg-blue-700 font-semibold p-3 rounded-lg transition">
Login
</button>

<p id="msg" class="text-center text-gray-300 mt-4"></p>

</div>

</div>

<script>

/* ---------- NAVBAR ---------- */

const user = localStorage.getItem("user")
const nav = document.getElementById("nav-links")

if(user){

nav.innerHTML = `
<a href="/dashboard.html" class="hover:text-white">Dashboard</a>
<a href="/profile.html?user=${user}" class="hover:text-white">Profile</a>
<button onclick="logout()" class="text-red-400 hover:text-red-300">Logout</button>
`

}else{

nav.innerHTML = `
<a href="/login.html" class="hover:text-white">Login</a>
<a href="/register.html" class="hover:text-white">Register</a>
`

}

function logout(){
localStorage.removeItem("user")
window.location.href="/login.html"
}


/* ---------- AUTO REDIRECT ---------- */

if(user){
window.location.href="/dashboard.html"
}


/* ---------- LOGIN ---------- */

async function login(){

const username = document.getElementById("username").value
const password = document.getElementById("password").value

if(!username || !password){
document.getElementById("msg").innerText = "Please fill all fields"
return
}

const res = await fetch("/api/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username,password})
})

const data = await res.json()

document.getElementById("msg").innerText = data.message

if(data.success){

localStorage.setItem("user", username)

window.location.href="/dashboard.html"

}

}

</script>

</body>
</html>
